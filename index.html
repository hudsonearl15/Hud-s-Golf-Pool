              )

                React.createElement("div",{style:{background:"#fef2f2",borderRadius:"8px",padding:"12px",border:"1px solid #fecaca"}},

                  let best={name:"",pts:999,tourn:"",golfer:""};
                  LEADERBOARD.forEach(m=>m.breakdown.forEach(b=>{if(b.pts<best.pts)best={name:m.name,pts:b.pts,tourn:b.tournament,golfer:b.golfer};}));
                  return React.createElement("div",{style:{background:"#fffbeb",borderRadius:"8px",padding:"12px",border:"1px solid #fde68a"}},
                    React.createElement("div",{style:{fontSize:"12px",color:"#b45309",fontWeight:"500"}},"Best Single Week"),
                    React.createElement("div",{className:"serif",style:{fontWeight:"700",color:"#78350f"}},best.golfer),
                    React.createElement("div",{style:{fontSize:"14px",color:"#b45309"}},ordinal(best.pts)+" — "+best.name),
                    React.createElement("div",{style:{fontSize:"12px",color:"#d97706"}},best.tourn)
                  );
                })(),
                (()=>{
                  const allScores=LEADERBOARD.flatMap(m=>m.breakdown.map(b=>b.pts));

                })()

            )
          )
        ),

        // Modal
        React.createElement(MemberDetailModal,{member:selectedMember,open:!!selectedMember,onClose:()=>setSelectedMember(null)})
      );
