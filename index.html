    spm&&h("div",{style:{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"},onClick:function(){setSpm(false);setPe("")}},
      h("div",{style:{position:"absolute",inset:0,background:"rgba(0,0,0,.4)",backdropFilter:"blur(4px)"}}),
      h("div",{style:{position:"relative",background:"white",borderRadius:"12px",boxShadow:"0 25px 50px rgba(0,0,0,.25)",maxWidth:"420px",width:"100%",animation:"modalIn .2s ease-out"},onClick:function(e){e.stopPropagation()}},
        h("div",{style:{padding:"16px",borderBottom:"1px solid #e7e5e4",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("h3",{className:"sf",style:{fontSize:"17px",fontWeight:"700"}},"Submit Your Pick"),
          h("button",{onClick:function(){setSpm(false);setPe("")},style:{background:"none",border:"none",color:"#a8a29e",fontSize:"22px",lineHeight:1}},"×")
        ),
        h("div",{style:{padding:"16px",display:"flex",flexDirection:"column",gap:"12px"}},
          // Show current tournament (no dropdown)
          actT?h("div",{style:{padding:"12px 14px",background:"linear-gradient(135deg,#ecfdf5,#d1fae5)",borderRadius:"8px",border:"1px solid #a7f3d0"}},
            h("div",{style:{fontSize:"11px",color:"#047857",fontWeight:"600",textTransform:"uppercase",letterSpacing:"1px"}},"This Week's Tournament"),
            h("div",{className:"sf",style:{fontSize:"16px",fontWeight:"700",color:"#064e3b",marginTop:"4px"}},actT.name),
            (function(){var tn=TN.find(function(t){return t.id===actT.id});return tn&&tn.mj?h("span",{className:"bg bg-m",style:{marginTop:"6px"}},"Major (2× Points)"):null})()
          ):h("div",{style:{padding:"12px",background:"#fef2f2",borderRadius:"8px",border:"1px solid #fecaca",fontSize:"13px",color:"#b91c1c"}},"No active tournament set. Ask Hudson to set one in the Admin panel."),
          // Check if already picked
          actT&&wp[actT.id+"_"+user]?h("div",{style:{padding:"12px",background:"#fffbeb",borderRadius:"8px",border:"1px solid #fde68a"}},
            h("div",{style:{fontSize:"13px",color:"#92400e"}},"You already submitted: ",h("strong",null,wp[actT.id+"_"+user].golfer)),
            h("div",{style:{fontSize:"11px",color:"#b45309",marginTop:"4px"}},"Contact Hudson if you need to change your pick.")
          ):actT&&h(React.Fragment,null,
            h("div",{style:{position:"relative"}},
              h("label",{style:{fontSize:"12px",color:"#78716c",fontWeight:"500",display:"block",marginBottom:"4px"}},"Golfer Name"),
              h("input",{className:"if",placeholder:"Start typing a golfer name...",value:pg,
                onChange:function(e){setPg(e.target.value);setShowAC(true);setPe("")},
                onFocus:function(){if(pg.length>=2)setShowAC(true)},
                onKeyDown:function(e){if(e.key==="Enter"){setShowAC(false);submitPick();}if(e.key==="Escape")setShowAC(false);}
              }),
              // Autocomplete dropdown
              showAC&&acSuggestions.length>0&&h("div",{style:{position:"absolute",top:"100%",left:0,right:0,zIndex:60,background:"white",border:"1px solid #e7e5e4",borderRadius:"8px",boxShadow:"0 8px 24px rgba(0,0,0,0.12)",marginTop:"4px",maxHeight:"240px",overflowY:"auto"}},
                acSuggestions.map(function(s){
                  return h("button",{key:s.name,
                    onClick:function(){setPg(s.name);setShowAC(false);setPe("");},
                    style:{display:"flex",alignItems:"center",gap:"8px",width:"100%",padding:"10px 12px",border:"none",borderBottom:"1px solid #f5f5f4",background:s.used?"#fef2f2":"white",textAlign:"left",cursor:s.used?"not-allowed":"pointer",fontSize:"13px",transition:"background 0.1s"},
                    onMouseOver:function(e){if(!s.used)e.currentTarget.style.background="#f5f5f4"},
                    onMouseOut:function(e){e.currentTarget.style.background=s.used?"#fef2f2":"white"}
                  },
                    h("span",{style:{fontSize:"14px"}},s.used?"❌":"✅"),
                    h("span",{style:{fontWeight:"500",flex:1,color:s.used?"#b91c1c":"#292524",textDecoration:s.used?"line-through":"none"}},s.name),
                    s.used&&h("span",{style:{fontSize:"10px",color:"#dc2626",fontWeight:"600"}},"USED"),
                    s.timesPicked>0&&!s.used&&h("span",{style:{fontSize:"10px",color:"#a8a29e"}},s.timesPicked+" pool pick"+(s.timesPicked>1?"s":""))
                  );
                })
              )
            ),
            pe&&h("div",{style:{padding:"10px 12px",background:"#fef2f2",borderRadius:"8px",border:"1px solid #fecaca",fontSize:"13px",color:"#b91c1c"}},pe),
            usedG.length>0&&h("div",null,
              h("div",{style:{fontSize:"11px",color:"#dc2626",fontWeight:"600",marginBottom:"4px"}},"⚠️ Already used this season (cannot pick again):"),
              h("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px"}},usedG.map(function(g,i){return h("span",{key:i,style:{display:"inline-flex",alignItems:"center",padding:"2px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:"500",background:"#fee2e2",color:"#b91c1c"}},g)}))
            ),
            h("button",{className:"bp",onClick:submitPick},"Submit Pick")
          )
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
